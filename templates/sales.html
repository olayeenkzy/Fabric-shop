<!DOCTYPE html>
<html>

<head>

<title>Sales History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Sales History</h2>

<a href="/dashboard" class="btn btn-secondary mb-3">Back to Dashboard</a>

<div class="card shadow">

<div class="card-body p-0">

<table class="table table-striped mb-0">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Fabric</th>
<th>Qty</th>
<th>Total</th>
<th>Profit</th>
<th>Date</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for s in sales %}

<tr>

<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>₦{{s[3]}}</td>
<td>₦{{s[4]}}</td>
<td>{{s[5]}}</td>

<td>

<form method="POST" action="/delete_sale/{{s[0]}}" style="display:inline;" onsubmit="return managerAuth(this)">
<input type="hidden" name="pin">
<button class="btn btn-danger btn-sm">Delete</button>
</form>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>


<script>

function managerAuth(form){

let pin = prompt("Enter Manager PIN");

if(pin === "0000"){

form.querySelector("input[name='pin']").value = pin;

return true;

}

alert("Incorrect PIN");
return false;

}

</script>

</body>

</html>
