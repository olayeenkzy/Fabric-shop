<!DOCTYPE html>
<html>
<head>

<title>Sales History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Sales History</h2>

<div class="d-flex gap-2 mb-3">

<a href="/dashboard" class="btn btn-secondary">Back</a>

<a href="/export_csv" class="btn btn-success">Export CSV</a>

<form method="GET" action="/sales_history" class="d-flex">
<input type="date" name="date" class="form-control me-2">
<button class="btn btn-primary">Filter</button>
</form>

</div>

<table class="table table-striped">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Fabric</th>
<th>Qty</th>
<th>Total</th>
<th>Profit</th>
<th>Date</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for s in sales %}

<tr>

<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>₦{{s[3]}}</td>
<td>₦{{s[4]}}</td>
<td>{{s[5]}}</td>

<td>
<a href="/delete_sale/{{s[0]}}" class="btn btn-danger btn-sm">Delete</a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
