<!DOCTYPE html>
<html>

<head>

<title>Edit Fabric</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Edit Fabric</h2>

<div class="card shadow p-4">

<form method="POST">

<div class="mb-3">

<label class="form-label">Cost Price</label>

<input name="cost" type="number" value="{{fabric[2]}}" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Selling Price</label>

<input name="price" type="number" value="{{fabric[3]}}" class="form-control">

</div>

<button class="btn btn-warning">Update Fabric</button>

<a href="/dashboard" class="btn btn-secondary">Cancel</a>

</form>

</div>

</div>

</body>

</html>
