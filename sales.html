<!DOCTYPE html>
<html>
<head>

<title>Sales History</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f8;
    margin:0;
}

.container{
    width:90%;
    margin:auto;
}

h1{
    margin-top:30px;
}

.top-bar{
    margin-top:20px;
    margin-bottom:20px;
}

.btn{
    padding:10px 16px;
    border:none;
    border-radius:6px;
    text-decoration:none;
    font-size:14px;
    margin-right:10px;
}

.back{
    background:#333;
    color:white;
}

.export{
    background:#2e7d32;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

th{
    background:#1f2933;
    color:white;
    padding:14px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f1f5f9;
}

.delete{
    background:#e53935;
    color:white;
    padding:6px 10px;
    border-radius:4px;
    text-decoration:none;
}

.date-filter{
    margin-bottom:20px;
}

input[type="date"]{
    padding:8px;
}

button{
    padding:8px 12px;
}

</style>

</head>

<body>

<div class="container">

<h1>Sales History</h1>

<div class="top-bar">

<a class="btn back" href="/dashboard">Back to Dashboard</a>

<a class="btn export" href="/export_csv">Export CSV</a>

</div>


<div class="date-filter">

<form>

<input type="date" name="date">

<button type="submit">Filter</button>

</form>

</div>


<table>

<tr>
<th>Fabric</th>
<th>Quantity</th>
<th>Total (₦)</th>
<th>Profit (₦)</th>
<th>Date</th>
<th>Action</th>
</tr>

{% for s in sales %}

<tr>

<td>{{ s[1] }}</td>
<td>{{ s[2] }}</td>
<td>₦{{ s[3] }}</td>
<td>₦{{ s[4] }}</td>
<td>{{ s[5] }}</td>

<td>
<a class="delete" href="/delete_sale/{{ s[0] }}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
