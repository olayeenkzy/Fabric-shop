<!DOCTYPE html>
<html>

<head>

<title>Add Fabric</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Add New Fabric</h2>

<div class="card shadow p-4">

<form method="POST">

<div class="mb-3">

<label class="form-label">Fabric Name</label>

<input name="name" class="form-control" required>

</div>

<div class="mb-3">

<label class="form-label">Cost Price</label>

<input name="cost" type="number" class="form-control" required>

</div>

<div class="mb-3">

<label class="form-label">Selling Price</label>

<input name="price" type="number" class="form-control" required>

</div>

<div class="mb-3">

<label class="form-label">Quantity</label>

<input name="qty" type="number" class="form-control" required>

</div>

<button class="btn btn-success">Add Fabric</button>

<a href="/dashboard" class="btn btn-secondary">Cancel</a>

</form>

</div>

</div>

</body>
</html>
